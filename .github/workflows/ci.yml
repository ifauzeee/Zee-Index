name: CI
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  check:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm prisma generate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit Tests
        run: pnpm test -- run

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(pnpm list @playwright/test --depth=0 | grep @playwright/test | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Cache Playwright binary
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps

      - name: Run E2E Tests
        run: pnpm test:e2e
        env:
          CI: true
          SKIP_ENV_VALIDATION: "1"
          GOOGLE_CLIENT_ID: "mock_client_id"
          GOOGLE_CLIENT_SECRET: "mock_client_secret"
          NEXTAUTH_SECRET: "super_secret_mock_key_at_least_32_chars_long"
          NEXTAUTH_URL: "http://localhost:3000"
          KV_REST_API_URL: "https://mock.upstash.io"
          KV_REST_API_TOKEN: "mock_token"

      - name: Build
        run: pnpm build
        env:
          SKIP_ENV_VALIDATION: "1"
          GOOGLE_CLIENT_ID: "mock_client_id"
          GOOGLE_CLIENT_SECRET: "mock_client_secret"
          NEXTAUTH_SECRET: "super_secret_mock_key_at_least_32_chars_long"
          NEXTAUTH_URL: "http://localhost:3000"
          KV_REST_API_URL: "https://mock.upstash.io"
          KV_REST_API_TOKEN: "mock_token"
