openapi: 3.1.0
info:
  title: Zee-Index API
  description: |
    Core API documentation for Zee-Index - a self-hosted Google Drive CMS,
    explorer, and streaming platform.

    ## Authentication
    Most endpoints require authentication via NextAuth.js session or folder-specific tokens.

    ## Rate Limiting
    - General API: 500 requests per minute
    - Download API: 100 requests per hour
    - Admin API: 50 requests per minute

    ## Error Responses
    Most errors follow this format:
    ```json
    {
      "error": "Error message"
    }
    ```
  version: 2.0.0
  contact:
    name: Zee-Index Support
    url: https://github.com/ifauzeee/Zee-Index/issues
  license:
    name: AGPL-3.0
    url: https://www.gnu.org/licenses/agpl-3.0.html

servers:
  - url: http://localhost:3000
    description: Development server
  - url: https://zee-index.duckdns.org
    description: Production server

tags:
  - name: Files
    description: File and folder operations
  - name: Auth
    description: Authentication endpoints
  - name: Admin
    description: Admin-only operations
  - name: Share
    description: Share link management
  - name: Health
    description: Health check endpoints

paths:
  # ==============================================================================
  # HEALTH ENDPOINTS
  # ==============================================================================
  /api/health:
    get:
      tags:
        - Health
      summary: Health check
      description: Check the health status of the application and its dependencies
      operationId: healthCheck
      responses:
        "200":
          description: All services healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: One or more services unhealthy

  /api/admin/system-health:
    get:
      tags:
        - Admin
        - Health
      summary: Read operational system health
      description: Returns measured dependency health, latency summary, and 24h error counts for the admin dashboard
      operationId: getAdminSystemHealth
      security:
        - sessionAuth: []
      responses:
        "200":
          description: System health payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSystemHealthResponse"

  # ==============================================================================
  # FILE ENDPOINTS
  # ==============================================================================
  /api/files:
    get:
      tags:
        - Files
      summary: List files in a folder
      description: Get a paginated list of files and folders within a specified folder
      operationId: listFiles
      parameters:
        - name: folderId
          in: query
          required: true
          schema:
            type: string
          description: Google Drive folder ID
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 100
          description: Number of items per page
        - name: pageToken
          in: query
          schema:
            type: string
          description: Token for pagination
        - name: share_token
          in: query
          schema:
            type: string
          description: Share token for public access
      responses:
        "200":
          description: List of files
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileListResponse"
        "401":
          description: Unauthorized or folder protected
        "404":
          description: Folder not found

  /api/filedetails:
    get:
      tags:
        - Files
      summary: Get file details
      description: Get detailed metadata for a specific file
      operationId: getFileDetails
      parameters:
        - name: fileId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: File details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DriveFile"

  /api/download:
    get:
      tags:
        - Files
      summary: Download a file
      description: Initiate file download from Google Drive
      operationId: downloadFile
      parameters:
        - name: fileId
          in: query
          required: true
          schema:
            type: string
        - name: share_token
          in: query
          schema:
            type: string
        - name: access_token
          in: query
          schema:
            type: string
          description: Folder access token for protected folders
      responses:
        "200":
          description: File stream
        "302":
          description: Redirect to Google Drive download URL
        "401":
          description: Unauthorized
        "404":
          description: File not found

  /api/search:
    get:
      tags:
        - Files
      summary: Search files
      description: Search for files within a folder
      operationId: searchFiles
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search query
        - name: folderId
          in: query
          required: true
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
            enum: [image, video, audio, document, all]
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DriveFile"

  /api/files/upload:
    post:
      tags:
        - Files
      summary: Upload a file
      description: Upload a file to Google Drive (Admin only)
      operationId: uploadFile
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                folderId:
                  type: string
      responses:
        "200":
          description: Upload successful
        "401":
          description: Unauthorized
        "403":
          description: Admin access required

  /api/files/rename:
    patch:
      tags:
        - Files
      summary: Rename a file
      description: Rename a file or folder (Admin only)
      operationId: renameFile
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - fileId
                - newName
              properties:
                fileId:
                  type: string
                newName:
                  type: string
      responses:
        "200":
          description: Rename successful
        "401":
          description: Unauthorized

  /api/files/delete:
    delete:
      tags:
        - Files
      summary: Delete a file
      description: Move file to trash (Admin only)
      operationId: deleteFile
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - fileId
              properties:
                fileId:
                  type: string
      responses:
        "200":
          description: Delete successful
        "401":
          description: Unauthorized

  # ==============================================================================
  # AUTH ENDPOINTS
  # ==============================================================================
  /api/auth/me:
    get:
      tags:
        - Auth
      summary: Get current user
      description: Get the currently authenticated user's information
      operationId: getCurrentUser
      responses:
        "200":
          description: User information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated

  /api/auth/folder:
    post:
      tags:
        - Auth
      summary: Authenticate to protected folder
      description: Submit credentials to access a protected folder
      operationId: authenticateFolder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - folderId
                - password
              properties:
                folderId:
                  type: string
                id:
                  type: string
                  description: Optional user ID
                password:
                  type: string
      responses:
        "200":
          description: Access granted
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
        "401":
          description: Invalid credentials

  # ==============================================================================
  # SHARE ENDPOINTS
  # ==============================================================================
  /api/share:
    post:
      tags:
        - Share
      summary: Create share link
      description: Create a shareable link for a file or folder (Admin only)
      operationId: createShareLink
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - itemName
                - type
                - expiresIn
              properties:
                path:
                  type: string
                  description: Required for single-item shares
                itemName:
                  type: string
                type:
                  type: string
                  enum: [timed, session]
                expiresIn:
                  type: string
                  default: 7d
                  description: Duration string such as 1h, 7d, or 30d
                loginRequired:
                  type: boolean
                  default: false
                items:
                  type: array
                  description: Include to create a shared collection
                  items:
                    $ref: "#/components/schemas/DriveFile"
                maxUses:
                  type: integer
                  nullable: true
                preventDownload:
                  type: boolean
                hasWatermark:
                  type: boolean
                watermarkText:
                  type: string
                  nullable: true
      responses:
        "200":
          description: Share link created
          content:
            application/json:
              schema:
                type: object
                properties:
                  shareableUrl:
                    type: string
                  token:
                    type: string
                  jti:
                    type: string
                  newShareLink:
                    $ref: "#/components/schemas/ShareLink"
        "401":
          description: Unauthorized

  /api/share/list:
    get:
      tags:
        - Share
      summary: List share links
      description: Get all active share links (Admin only)
      operationId: listShareLinks
      security:
        - sessionAuth: []
      responses:
        "200":
          description: List of share links
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ShareLink"

  /api/share/delete:
    post:
      tags:
        - Share
      summary: Delete share link
      description: Delete a share link (Admin only)
      operationId: deleteShareLink
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShareLink"
      responses:
        "200":
          description: Share link deleted
        "401":
          description: Unauthorized

  /api/share/revoke:
    post:
      tags:
        - Share
      summary: Revoke a share token
      description: Blocks an existing share token until its original expiry time
      operationId: revokeShareLink
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - jti
                - expiresAt
              properties:
                jti:
                  type: string
                expiresAt:
                  type: string
                  format: date-time
      responses:
        "200":
          description: Share link revoked

  /api/share/status:
    post:
      tags:
        - Share
      summary: Check share token status
      description: Validates whether a share token is still usable
      operationId: getShareStatus
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - shareToken
              properties:
                shareToken:
                  type: string
      responses:
        "200":
          description: Validation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                  error:
                    type: string

  /api/share/track:
    post:
      tags:
        - Share
      summary: Track share access
      description: Increments the view count for a share link
      operationId: trackShareAccess
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - shareToken
              properties:
                shareToken:
                  type: string
      responses:
        "204":
          description: Access tracked

  /api/share/items/{shareId}:
    get:
      tags:
        - Share
      summary: Read shared collection items
      description: Resolves the items stored for a collection share
      operationId: getSharedCollectionItems
      parameters:
        - name: shareId
          in: path
          required: true
          schema:
            type: string
        - name: share_token
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Collection contents
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/DriveFile"
                  collectionName:
                    type: string

  # ==============================================================================
  # ADMIN ENDPOINTS
  # ==============================================================================
  /api/admin/config:
    get:
      tags:
        - Admin
      summary: Get app configuration
      description: Get current application configuration
      operationId: getConfig
      security:
        - sessionAuth: []
      responses:
        "200":
          description: Configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppConfig"
    post:
      tags:
        - Admin
      summary: Update app configuration
      description: Update application configuration (Admin only)
      operationId: updateConfig
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppConfig"
      responses:
        "200":
          description: Configuration updated
        "401":
          description: Unauthorized

  /api/admin/users:
    get:
      tags:
        - Admin
      summary: List admin users
      description: Get list of admin email addresses
      operationId: listAdmins
      security:
        - sessionAuth: []
      responses:
        "200":
          description: List of admin emails
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
    post:
      tags:
        - Admin
      summary: Add admin user
      description: Add a new admin user
      operationId: addAdmin
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: Admin added
        "401":
          description: Unauthorized
    delete:
      tags:
        - Admin
      summary: Remove admin user
      description: Remove an admin user
      operationId: removeAdmin
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: Admin removed
        "401":
          description: Unauthorized

  /api/admin/activity-log:
    get:
      tags:
        - Admin
      summary: Get activity logs
      description: Get system activity logs
      operationId: getActivityLogs
      security:
        - sessionAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Activity logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityLog"

# ==============================================================================
# COMPONENTS
# ==============================================================================
components:
  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: next-auth.session-token
      description: NextAuth.js session cookie

  schemas:
    DriveFile:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        mimeType:
          type: string
        size:
          type: string
        modifiedTime:
          type: string
          format: date-time
        createdTime:
          type: string
          format: date-time
        isFolder:
          type: boolean
        hasThumbnail:
          type: boolean
        thumbnailLink:
          type: string
        webViewLink:
          type: string
        parents:
          type: array
          items:
            type: string
        trashed:
          type: boolean

    FileListResponse:
      type: object
      properties:
        files:
          type: array
          items:
            $ref: "#/components/schemas/DriveFile"
        nextPageToken:
          type: string
          nullable: true
        folderPath:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              name:
                type: string

    User:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        image:
          type: string
        role:
          type: string
          enum: [USER, ADMIN, GUEST]
        isGuest:
          type: boolean

    ShareLink:
      type: object
      properties:
        id:
          type: string
        path:
          type: string
        token:
          type: string
        jti:
          type: string
        expiresAt:
          type: string
          format: date-time
        loginRequired:
          type: boolean
        itemName:
          type: string
        viewCount:
          type: integer
        isCollection:
          type: boolean

    AppConfig:
      type: object
      properties:
        hideAuthor:
          type: boolean
        disableGuestLogin:
          type: boolean
        appName:
          type: string
        logoUrl:
          type: string
        faviconUrl:
          type: string
        primaryColor:
          type: string

    ActivityLog:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        timestamp:
          type: integer
        severity:
          type: string
          enum: [info, warning, error, critical]
        userEmail:
          type: string
        itemName:
          type: string
        status:
          type: string
        ipAddress:
          type: string

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ok, error]
        timestamp:
          type: string
          format: date-time
        uptime:
          type: number
        environment:
          type: string
        services:
          type: object
          properties:
            database:
              $ref: "#/components/schemas/ServiceHealth"
            cache:
              allOf:
                - $ref: "#/components/schemas/ServiceHealth"
                - type: object
                  properties:
                    backend:
                      type: string
                      enum: [redis, memory]
            google_drive:
              $ref: "#/components/schemas/GoogleDriveHealth"

    ServiceHealth:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, unhealthy, not_configured]
        latency:
          type: integer
        checkedAt:
          type: string
          format: date-time
        error:
          type: string

    GoogleDriveHealth:
      allOf:
        - $ref: "#/components/schemas/ServiceHealth"
        - type: object
          properties:
            quota:
              type: object
              nullable: true
              properties:
                usage:
                  type: integer
                limit:
                  type: integer

    AdminSystemHealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ok, error]
        timestamp:
          type: string
          format: date-time
        services:
          type: object
          properties:
            database:
              $ref: "#/components/schemas/ServiceHealth"
            cache:
              allOf:
                - $ref: "#/components/schemas/ServiceHealth"
                - type: object
                  properties:
                    backend:
                      type: string
                      enum: [redis, memory]
            google_drive:
              $ref: "#/components/schemas/GoogleDriveHealth"
        errorRate:
          type: object
          properties:
            last24h:
              type: integer
            previous24h:
              type: integer
            trendPercentage:
              type: number
        latency:
          type: object
          properties:
            totalCheckMs:
              type: integer
            averageDependencyMs:
              type: integer
            fastestDependency:
              type: object
              properties:
                name:
                  type: string
                latency:
                  type: integer
            slowestDependency:
              type: object
              properties:
                name:
                  type: string
                latency:
                  type: integer
            dependencies:
              type: object
              properties:
                database:
                  type: integer
                cache:
                  type: integer
                google_drive:
                  type: integer

    Error:
      type: object
      properties:
        error:
          type: string
        details:
          oneOf:
            - type: string
            - type: array
              items:
                type: object
