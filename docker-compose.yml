services:
  postgres:
    image: postgres:16-alpine
    container_name: zee-postgres
    restart: always
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-zee_index}
    deploy:
      resources:
        limits:
          memory: 200M
        reservations:
          memory: 100M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: zee-redis
    restart: always
    volumes:
      - redis_data:/data
    command: redis-server --appendonly no --save 300 100 --maxmemory 128mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          memory: 150M
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  zee-index:
    container_name: zee-index
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_ROOT_FOLDER_ID: ${NEXT_PUBLIC_ROOT_FOLDER_ID}
        NEXT_PUBLIC_ROOT_FOLDER_NAME: ${NEXT_PUBLIC_ROOT_FOLDER_NAME}
        NEXT_PUBLIC_ENABLE_LOCAL_STORAGE: ${NEXT_PUBLIC_ENABLE_LOCAL_STORAGE}
        NEXT_PUBLIC_LOCAL_STORAGE_NAME: ${NEXT_PUBLIC_LOCAL_STORAGE_NAME}
        BUILDKIT_INLINE_CACHE: 1
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-zee_index}?schema=public
      - NODE_OPTIONS=--max-old-space-size=384
    volumes:
      - .env:/app/.env
      - ./public/uploads:/app/public/uploads
      - ./storage:/app/storage
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s

  cron-monitor:
    image: curlimages/curl:8.10.1
    container_name: zee-cron-monitor
    restart: unless-stopped
    environment:
      - CRON_SECRET=${CRON_SECRET}
      - CRON_MONITOR_INTERVAL_SECONDS=${CRON_MONITOR_INTERVAL_SECONDS:-300}
    entrypoint: ["/bin/sh"]
    command:
      - -c
      - |
        echo "[cron-monitor] Waiting for zee-index health..."
        until curl -fsS http://zee-index:3000/api/health >/dev/null 2>&1; do
          sleep 5
        done
        echo "[cron-monitor] zee-index is healthy."

        while true; do
          if [ -n "$${CRON_SECRET}" ]; then
            echo "[cron-monitor] Running incident monitor cron..."
            if curl -fsS --connect-timeout 10 --max-time 60 -H "Authorization: Bearer $${CRON_SECRET}" http://zee-index:3000/api/cron/incident-monitor; then
              printf '\n'
            else
              code=$$?
              printf '\n'
              echo "[cron-monitor] Incident monitor cron failed with curl exit $${code}."
            fi
            echo "[cron-monitor] Running storage check cron..."
            if curl -fsS --connect-timeout 10 --max-time 60 -H "Authorization: Bearer $${CRON_SECRET}" http://zee-index:3000/api/cron/storage-check; then
              printf '\n'
            else
              code=$$?
              printf '\n'
              echo "[cron-monitor] Storage check cron failed with curl exit $${code}."
            fi
          else
            echo "[cron-monitor] CRON_SECRET is empty. Skipping jobs."
          fi
          sleep "$${CRON_MONITOR_INTERVAL_SECONDS:-300}"
        done
    depends_on:
      zee-index:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 40M

  duckdns:
    image: lscr.io/linuxserver/duckdns:latest
    container_name: duckdns
    environment:
      - SUBDOMAINS=${DUCKDNS_DOMAIN:-zee-index}
      - TOKEN=${DUCKDNS_TOKEN}
      - LOG_FILE=false
    entrypoint: ["/bin/sh"]
    command:
      - -c
      - |
        if [ -z "$${TOKEN}" ] || [ -z "$${SUBDOMAINS}" ]; then
          echo "[duckdns] DUCKDNS_DOMAIN or DUCKDNS_TOKEN is empty. DuckDNS updater is disabled."
          tail -f /dev/null
        fi
        exec /init
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 30M

  caddy:
    image: caddy:alpine
    container_name: caddy
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - CADDY_SITE=${CADDY_SITE:-localhost}
    deploy:
      resources:
        limits:
          memory: 50M
    depends_on:
      zee-index:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
